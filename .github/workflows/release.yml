name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Install Android SDK Packages
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          yes | "${SDKMANAGER}" --licenses
          "${SDKMANAGER}" "platforms;android-36" "build-tools;36.0.0" "platform-tools"
      - name: Ensure Gradle Wrapper Is Executable
        run: chmod +x gradlew
      - name: Build Release APK Assets
        run: ./gradlew test :vpnservice:testDebugUnitTest :app:assembleDebug :app:assembleInternal --no-configuration-cache
      - name: Prepare Release Assets
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p release-assets
          INTERNAL_ARM64="$(find app/build/outputs/apk/internal -name '*arm64-v8a*internal*.apk' | head -n 1)"
          INTERNAL_X64="$(find app/build/outputs/apk/internal -name '*x86_64*internal*.apk' | head -n 1)"
          DEBUG_ARM64="$(find app/build/outputs/apk/debug -name '*arm64-v8a*debug*.apk' | head -n 1)"
          DEBUG_X64="$(find app/build/outputs/apk/debug -name '*x86_64*debug*.apk' | head -n 1)"
          cp "$INTERNAL_ARM64" "release-assets/tunguska-${TAG}-arm64-v8a-internal.apk"
          cp "$INTERNAL_X64" "release-assets/tunguska-${TAG}-x86_64-emulator-internal.apk"
          cp "$DEBUG_ARM64" "release-assets/tunguska-${TAG}-arm64-v8a-debug.apk"
          cp "$DEBUG_X64" "release-assets/tunguska-${TAG}-x86_64-emulator-debug.apk"
          sha256sum "release-assets/tunguska-${TAG}-arm64-v8a-internal.apk" > "release-assets/tunguska-${TAG}-arm64-v8a-internal.apk.sha256"
          sha256sum "release-assets/tunguska-${TAG}-x86_64-emulator-internal.apk" > "release-assets/tunguska-${TAG}-x86_64-emulator-internal.apk.sha256"
          sha256sum "release-assets/tunguska-${TAG}-arm64-v8a-debug.apk" > "release-assets/tunguska-${TAG}-arm64-v8a-debug.apk.sha256"
          sha256sum "release-assets/tunguska-${TAG}-x86_64-emulator-debug.apk" > "release-assets/tunguska-${TAG}-x86_64-emulator-debug.apk.sha256"
          cat > release-assets/release-notes.md <<EOF
          Installable APK assets for ${TAG}.

          - \`tunguska-${TAG}-arm64-v8a-internal.apk\`: primary non-debuggable sideload build for real arm64 Android devices.
          - \`tunguska-${TAG}-x86_64-emulator-internal.apk\`: non-debuggable emulator build for x86_64 Android Emulator testing.
          - \`tunguska-${TAG}-arm64-v8a-debug.apk\`: debuggable arm64 build for troubleshooting only.
          - \`tunguska-${TAG}-x86_64-emulator-debug.apk\`: debuggable x86_64 emulator build for troubleshooting only.
          - Each APK ships with a matching \`.sha256\` checksum file.
          EOF
      - name: Create Or Update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --title "Tunguska ${TAG}" \
              --notes-file release-assets/release-notes.md
          fi
          gh release upload "${TAG}" \
            "release-assets/tunguska-${TAG}-arm64-v8a-internal.apk" \
            "release-assets/tunguska-${TAG}-arm64-v8a-internal.apk.sha256" \
            "release-assets/tunguska-${TAG}-x86_64-emulator-internal.apk" \
            "release-assets/tunguska-${TAG}-x86_64-emulator-internal.apk.sha256" \
            "release-assets/tunguska-${TAG}-arm64-v8a-debug.apk" \
            "release-assets/tunguska-${TAG}-arm64-v8a-debug.apk.sha256" \
            "release-assets/tunguska-${TAG}-x86_64-emulator-debug.apk" \
            "release-assets/tunguska-${TAG}-x86_64-emulator-debug.apk.sha256" \
            --clobber
