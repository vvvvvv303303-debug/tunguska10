name: Android CI

on:
  push:
    branches: [ "main" ] # проверьте, что ваша ветка называется main, а не master
  workflow_dispatch: # позволит запускать сборку кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: tunguska-debug
        path: app/build/outputs/apk/debug/*.apk
